server.port=${PORT:8081}
spring.application.name=leave-management

# --- DATABASE CONNECTION ---
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# --- HIBERNATE / JPA SETTINGS ---
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# --- CONNECTION POOL LIMIT ---
spring.datasource.hikari.maximum-pool-size=2
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.idle-timeout=10000
spring.datasource.hikari.max-lifetime=30000

# --- JWT SECURITY CONFIGURATION ---
college.app.jwtSecret=${JWT_SECRET}

# --- EUREKA CONFIGURATION ---
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.client.serviceUrl.defaultZone=${EUREKA_SERVER_URL:https://eureka-service-s7wp.onrender.com/eureka/}

# Render gives each deployed service an internal srv-* hostname that is not
# DNS-resolvable from other Render web services through Eureka. Advertise the
# public Render hostname over HTTPS so the API Gateway can resolve and route to
# LEAVE-MANAGEMENT correctly.
eureka.instance.hostname=${RENDER_EXTERNAL_HOSTNAME:localhost}
eureka.instance.prefer-ip-address=false
eureka.instance.non-secure-port-enabled=false
eureka.instance.secure-port-enabled=true
eureka.instance.secure-port=443
eureka.instance.home-page-url=https://${eureka.instance.hostname}/
eureka.instance.status-page-url=https://${eureka.instance.hostname}/actuator/info
eureka.instance.health-check-url=https://${eureka.instance.hostname}/actuator/health

management.endpoints.web.exposure.include=health
